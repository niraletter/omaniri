[main]
include=~/.config/omaniri/current/theme/foot.ini
term=xterm-256color
font=JetBrainsMono Nerd Font:size=7.5
pad=14x14
initial-window-mode=windowed
dpi-aware = yes
workers=0

[scrollback]
lines=10000

[cursor]
style=block
blink=no

[key-bindings]
primary-paste=none
clipboard-copy=Control+Insert Control+Shift+c XF86Copy
clipboard-paste=Shift+Insert Control+Shift+v XF86Paste

[mouse-bindings]
primary-paste=BTN_MIDDLE
scrollback-up-mouse=BTN_WHEEL_FORWARD
scrollback-down-mouse=BTN_WHEEL_BACK
font-increase=Control+BTN_WHEEL_FORWARD
font-decrease=Control+BTN_WHEEL_BACK
